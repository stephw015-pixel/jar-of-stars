<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Jar Full of Stars</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  :root {
    --bg: #0a0a1a;
    --win-bg: #0d0d2b;
    --win-border: #5555bb;
    --win-title: #2222aa;
    --win-title-active: #0000aa;
    --text: #aaaadd;
    --text-bright: #ffffff;
    --accent: #ff88aa;
    --accent2: #88aaff;
    --accent3: #ffcc44;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    width: 100vw;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
    position: relative;
    cursor: default;
  }

  /* SCANLINES */
  .scanlines {
    position:fixed; inset:0; pointer-events:none; z-index:100;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
  }

  /* STARFIELD */
  .starfield { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .px-star {
    position:absolute;
    image-rendering: pixelated;
    animation: twinkle var(--d) steps(1) infinite var(--dl);
    background: var(--c, transparent);
  }
  @keyframes twinkle { 0%,49%{opacity:1} 50%,100%{opacity:0} }

  /* ===================== WINDOWS ===================== */
  .win {
    position: absolute;
    border: 2px solid var(--win-border);
    box-shadow: 4px 4px 0 #000;
    background: var(--win-bg);
    user-select: none;
    z-index: 10;
    transition: opacity 0.2s steps(3), transform 0.2s steps(3);
  }
  .win.hide {
    opacity: 0;
    pointer-events: none;
    transform: scale(0.9);
  }
  .win.focused { z-index: 20; border-color: #8888ff; }

  .titlebar {
    background: var(--win-title-active);
    padding: 5px 6px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: grab;
    border-bottom: 2px solid var(--win-border);
  }
  .titlebar:active { cursor: grabbing; }
  .titlebar-text { font-size: 10px; color: var(--text-bright); letter-spacing: 0.5px; }
  .win-btns { display:flex; gap:2px; }
  .win-btn {
    width:14px; height:14px;
    border: 2px solid var(--win-border);
    background: var(--win-bg);
    font-size: 8px; color: var(--text-bright);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-family:'Press Start 2P',monospace;
    line-height:1;
  }
  .win-btn:hover { background: var(--win-border); }

  .win-body { padding: 14px; }

  #jarWin.hide { opacity:0; pointer-events:none; transform:translate(-50%,-50%) scale(0.85) !important; }
  #jarWin { transition: opacity 0.3s steps(3), transform 0.3s steps(3); }

  /* LID POP */
  #jarLid.popped {
    transform: translateY(-100px) rotate(-20deg) !important;
    opacity: 0 !important;
    transition: transform 0.4s steps(6), opacity 0.3s steps(3) !important;
  }

  /* FLYING STARS from jar to spread positions */
  .flying-star {
    position: fixed;
    pointer-events: none;
    z-index: 60;
    image-rendering: pixelated;
    transition: left 0.6s steps(10), top 0.6s steps(10), opacity 0.5s steps(4);
  }
  .flying-star.landed { opacity: 0; }

  .jar-area {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    cursor: pointer;
    width: fit-content;
  }

  /* 8-BIT JAR SVG */
  .jar-svg { image-rendering: pixelated; display:block; }
  .jar-area:hover .jar-svg { filter: brightness(1.2); }

  .jar-stars-inside {
    position: absolute;
    top: 80px; left: 30px;
    width: 180px; height: 170px;
    overflow: hidden;
    border-radius: 46% 46% 48% 48% / 10% 10% 22% 22%;
    pointer-events: none;
    z-index: 3;
    background: transparent;
  }

  .jar-inner-star {
    position: absolute;
    animation: bobPx var(--bd) steps(3) infinite var(--bdl);
    image-rendering: pixelated;
  }
  @keyframes bobPx { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }

  .jar-hint {
    font-size: 10px; color: var(--accent2);
    letter-spacing: 1px; text-align: center;
    animation: blinkTxt 1s steps(1) infinite;
  }
  @keyframes blinkTxt { 0%,49%{opacity:1} 50%,100%{opacity:0} }

  /* ===================== TITLE WINDOW ===================== */
  #titleWin { left: 50%; top: 10%; transform: translateX(-50%); }
  .title-text { font-size: 10px; color: var(--text-bright); line-height: 2.2; }
  .title-sub { font-size: 10px; color: var(--accent2); margin-top: 12px; line-height: 2; }

  /* ===================== COUNTER WINDOW ===================== */
  #counterWin { left: 50%; bottom: 20px; transform: translateX(-50%); }
  .counter-text { font-size: 10px; color: var(--accent3); letter-spacing: 1px; }

  /* ===================== STARS SPREAD ===================== */
  #starsSpread {
    position: fixed; inset: 0; z-index: 50;
    pointer-events: none; opacity: 0;
    transition: opacity 0.3s steps(4);
  }
  #starsSpread.visible { opacity: 1; pointer-events: all; }

  .spread-star {
    position: absolute;
    cursor: pointer;
    image-rendering: pixelated;
    animation: popPx 0.5s steps(5) both;
    animation-delay: var(--pd);
    transform: scale(0);
    filter: drop-shadow(0 0 4px var(--glow));
    transition: transform 0.1s steps(2), filter 0.1s steps(2);
  }
  .spread-star:hover {
    transform: scale(1.5) !important;
    filter: drop-shadow(0 0 14px var(--glow)) brightness(1.4);
    z-index: 5;
  }
  .spread-star.spent { opacity:0.15 !important; cursor:default; filter:grayscale(1) !important; }
  .spread-star.spent:hover { transform:scale(1) !important; }
  @keyframes popPx { to{transform:scale(1)} }

  /* BLINKING stars */
  .spread-star.blinks {
    animation: popPx 0.5s steps(5) both, starBlink var(--blink-d) steps(1) infinite var(--blink-dl);
  }
  @keyframes starBlink { 0%,74%{opacity:1} 75%,100%{opacity:0.1} }

  /* back button */
  #backBtn {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 60;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s steps(3);
  }
  #backBtn.visible { opacity:1; pointer-events:all; }
  #backBtn .win-body { padding: 8px 14px; cursor:pointer; }
  #backBtn .win-body:hover { background: var(--win-border); }
  #backBtn-text { font-size: 10px; color: var(--text-bright); letter-spacing:1px; }

  /* pick label */
  #pickLabel {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 60;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s steps(3);
  }
  #pickLabel.visible { opacity:1; }
  #pickLabel .win-body { padding: 6px 14px; }
  #pickLabel-text { font-size: 10px; color: var(--accent2); letter-spacing:1px; }

  /* ===================== NOTE OVERLAY ===================== */
  #noteOverlay {
    position: fixed; inset: 0; z-index: 80;
    background: rgba(5,5,20,0.85);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s steps(3);
  }
  #noteOverlay.visible { opacity:1; pointer-events:all; }

  .note-win {
    transform: scale(0.5); opacity: 0;
    transition: transform 0.3s steps(5), opacity 0.3s steps(3);
    max-width: 480px; width: 96vw;
    cursor: pointer;
  }
  .note-win.open { transform:scale(1); opacity:1; }
  .note-body-inner { padding: 12px 10px; display:flex; flex-direction:column; gap:12px; }
  .note-num { font-size:10px; color:var(--accent3); text-align:center; }
  .note-badge { display:flex; justify-content:center; image-rendering:pixelated; }
  .note-text {
    font-size: 13px; line-height: 2.6; color: var(--text-bright);
    background: repeating-linear-gradient(transparent,transparent 18px,rgba(80,80,180,0.15) 19px);
    white-space: pre-line;
    text-align: center;
    display: block;
    width: 100%;
    padding: 10px 0;
  }
  .note-hint { font-size:10px; color:var(--text); text-align:center; }

  /* ALERT */
  #alertWin {
    position:fixed; bottom:120px; left:50%; transform:translateX(-50%);
    z-index:90; opacity:0; pointer-events:none;
    transition:opacity 0.2s steps(3);
  }
  #alertWin.show { opacity:1; pointer-events:all; }
  .alert-body { padding:12px 16px; display:flex;flex-direction:column;gap:10px;align-items:center; }
  .alert-msg { font-size:10px; color:var(--text-bright); }
  .alert-ok {
    font-family:'Press Start 2P',monospace; font-size:10px;
    background:var(--win-bg); border:2px solid var(--win-border);
    color:var(--text-bright); padding:6px 16px; cursor:pointer;
    box-shadow:2px 2px 0 #000;
  }
  .alert-ok:active { transform:translate(2px,2px); box-shadow:none; }

  /* ===================== MOBILE ===================== */
  @media (max-width: 600px) {

    body {
      overflow-y: auto;
      justify-content: flex-start;
      padding: 20px 0 100px;
    }

    /* title window — static flow, centred */
    #titleWin {
      position: relative !important;
      left: auto !important;
      top: auto !important;
      transform: none !important;
      margin: 0 auto 24px;
      width: 88vw;
    }

    /* jar — static flow, centred */
    #jarWin {
      position: relative !important;
      left: auto !important;
      top: auto !important;
      transform: none !important;
      margin: 0 auto;
      display: block;
    }

    #jarOuter { width: 200px !important; height: 242px !important; }

    /* counter stays fixed at bottom */
    #counterWin { bottom: 14px; }

    /* font sizes */
    .title-text { font-size: 8px; line-height: 2; }
    .title-sub  { font-size: 8px; margin-top: 8px; line-height: 2; }
    .titlebar-text { font-size: 8px; }
    .win-btn { width: 12px; height: 12px; font-size: 7px; }
    .win-body { padding: 10px 12px; }
    .counter-text { font-size: 8px; }
    .jar-hint { font-size: 8px; }

    /* spread */
    .stars-container { width: 100vw; height: calc(100vh - 100px); }
    .spread-star { touch-action: manipulation; }

    /* back button */
    #backBtn-text { font-size: 8px; }
    #backBtn .win-body { padding: 8px 12px; }
    #backBtn { bottom: 14px; }
    #pickLabel-text { font-size: 8px; }
    #pickLabel .win-body { padding: 5px 10px; }

    /* note */
    .note-win { width: 94vw; max-width: 94vw; }
    .note-body-inner { padding: 10px 8px; gap: 8px; }
    .note-text { font-size: 11px; line-height: 2.4; }
    .note-num  { font-size: 8px; }
    .note-hint { font-size: 8px; }

    /* alert */
    #alertWin { bottom: 100px; }
    .alert-msg { font-size: 8px; }
    .alert-ok  { font-size: 8px; padding: 5px 12px; }

    /* jar interior */
    .jar-stars-inside {
      top: 70px !important;
      left: 26px !important;
      width: 148px !important;
      height: 154px !important;
    }
  }

  @media (hover: none) {
    .spread-star { min-width: 36px; min-height: 36px; }
  }
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="starfield" id="starfield"></div>

<!-- TITLE WINDOW -->
<div class="win" id="titleWin">
  <div class="titlebar">
    <span class="titlebar-text">✦ message.txt</span>
    <div class="win-btns"><div class="win-btn">_</div><div class="win-btn">□</div></div>
  </div>
  <div class="win-body">
    <div class="title-text">a jar full of stars</div>
    <div class="title-sub">one for whenever you need it most</div>
  </div>
</div>

<script>
// ===================== NOTES =====================
const NOTES = [
  { text: "you are not lost.\nthe map just hasn't\ncaught up to you yet." },
  { text: "the universe spent\n13.8 billion years\nbuilding towards you." },
  { text: "you don't have to earn rest.\nthe stars don't apologise\nfor being still." },
  { text: "something in you\nalready knows the answer.\ntrust it." },
  { text: "friendship makes\nthe vastness of existence\nfeel like home." },
  { text: "you are allowed to be\na work in progress\nand still be loved." },
  { text: "the light you see\nin other people?\nthey see it in you too." },
  { text: "you've survived 100%\nof your hardest days.\nthe next one doesn't stand a chance." },
  { text: "hope is not naive.\nit is the most radical\nthing you can do." },
  { text: "your softness is not weakness.\nit keeps the world\nfrom going entirely cold." },
  { text: "a star exploded\nso that you could exist.\nyou were always the point." },
  { text: "you don't have to be\nthe same person you were.\nseasons change. so do we." },
  { text: "the universe made you curious.\nthat means\nit wanted you to look." },
  { text: "you are someone's reason\nfor believing\npeople can be good." },
  { text: "freedom isn't somewhere you arrive.\nit's something you practice\nquietly, every day." },
  { text: "the ache you feel\nmeans something mattered.\nthat is everything." },
  { text: "you are not behind.\nyou are exactly where\nyour story needs you." },
  { text: "trust yourself\nthe way you trust the sky\nto still be there." },
  { text: "love comes back.\nin different shapes,\nit always finds you." },
  { text: "you are not a machine.\nyou are a whole cosmos.\nyour worth is not your output." },
  { text: "rest is not giving up.\nit is how you gather\nyourself for what's next." },
  { text: "want the big things.\nthe impossible,\nembarrassing ones. want them anyway." },
  { text: "the version of you\nthat got through the hardest bit?\nshe's still here." },
  { text: "every real connection\nleaves a mark\non the fabric of things." },
  { text: "you are not too much.\nyou are exactly enough\nfor the right people." },
  { text: "darkness is not the end.\nit is the in-between.\nthe sky is just resting." },
  { text: "something good\nis quietly making its way\nto you. keep the door open." },
  { text: "the people you've loved\ndon't disappear.\nthey become part of how you see." },
  { text: "choosing yourself\nis the most honest thing\nyou can do for everyone." },
  { text: "you are proof\nthat gentle and strong\ncan exist at the same time." },
];

// ===================== 8-BIT STAR SHAPES =====================
const STAR_SVGS = [
  // tall diamond sparkle (like the big glowing ones in ref)
  (c,s) => `<svg width="${s}" height="${s}" viewBox="0 0 16 20" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;display:block">
    <rect x="7" y="0" width="2" height="20" fill="${c}"/>
    <rect x="6" y="2" width="4" height="16" fill="${c}" opacity="0.7"/>
    <rect x="2" y="8" width="12" height="4" fill="${c}"/>
    <rect x="4" y="7" width="8" height="6" fill="${c}" opacity="0.8"/>
    <rect x="1" y="9" width="14" height="2" fill="${c}" opacity="0.5"/>
    <rect x="7" y="1" width="2" height="3" fill="#ffffff" opacity="0.9"/>
    <rect x="7" y="9" width="2" height="2" fill="#ffffff" opacity="0.6"/>
  </svg>`,
  // wide 4-point cross diamond (like the cyan/purple ones)
  (c,s) => `<svg width="${s}" height="${s}" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;display:block">
    <rect x="7" y="0" width="2" height="16" fill="${c}"/>
    <rect x="0" y="7" width="16" height="2" fill="${c}"/>
    <rect x="6" y="2" width="4" height="12" fill="${c}" opacity="0.6"/>
    <rect x="2" y="6" width="12" height="4" fill="${c}" opacity="0.6"/>
    <rect x="5" y="5" width="6" height="6" fill="${c}"/>
    <rect x="7" y="0" width="2" height="2" fill="#ffffff" opacity="0.9"/>
    <rect x="7" y="7" width="2" height="2" fill="#ffffff" opacity="0.5"/>
  </svg>`,
  // compact plus / small cross (the tiny + shapes in ref)
  (c,s) => `<svg width="${s}" height="${s}" viewBox="0 0 8 8" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;display:block">
    <rect x="3" y="0" width="2" height="8" fill="${c}"/>
    <rect x="0" y="3" width="8" height="2" fill="${c}"/>
    <rect x="3" y="0" width="2" height="2" fill="#ffffff" opacity="0.8"/>
  </svg>`,
  // big glowing star with rays (like the gold sunburst in ref)
  (c,s) => `<svg width="${s}" height="${s}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;display:block">
    <rect x="11" y="0" width="2" height="24" fill="${c}" opacity="0.5"/>
    <rect x="0" y="11" width="24" height="2" fill="${c}" opacity="0.5"/>
    <rect x="10" y="2" width="4" height="20" fill="${c}" opacity="0.7"/>
    <rect x="2" y="10" width="20" height="4" fill="${c}" opacity="0.7"/>
    <rect x="7" y="7" width="10" height="10" fill="${c}"/>
    <rect x="9" y="5" width="6" height="14" fill="${c}"/>
    <rect x="5" y="9" width="14" height="6" fill="${c}"/>
    <rect x="11" y="1" width="2" height="4" fill="#ffffff" opacity="0.9"/>
    <rect x="11" y="11" width="2" height="2" fill="#ffffff" opacity="0.8"/>
    <rect x="2" y="2" width="2" height="2" fill="${c}" opacity="0.4"/>
    <rect x="20" y="2" width="2" height="2" fill="${c}" opacity="0.4"/>
    <rect x="2" y="20" width="2" height="2" fill="${c}" opacity="0.4"/>
    <rect x="20" y="20" width="2" height="2" fill="${c}" opacity="0.4"/>
  </svg>`,
  // tiny single pixel square (scattered dots in ref)
  (c,s) => `<svg width="${s}" height="${s}" viewBox="0 0 4 4" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;display:block">
    <rect x="0" y="0" width="4" height="4" fill="${c}"/>
    <rect x="0" y="0" width="2" height="2" fill="#ffffff" opacity="0.4"/>
  </svg>`,
  // elongated vertical diamond (the tall narrow ones in ref)
  (c,s) => `<svg width="${s}" height="${s}" viewBox="0 0 10 20" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;display:block">
    <rect x="4" y="0" width="2" height="20" fill="${c}"/>
    <rect x="3" y="3" width="4" height="14" fill="${c}" opacity="0.7"/>
    <rect x="2" y="8" width="6" height="4" fill="${c}"/>
    <rect x="4" y="0" width="2" height="3" fill="#ffffff" opacity="0.8"/>
  </svg>`,
];

const STAR_COLORS = ['#ffcc44','#ffaa00','#88ccff','#44aaff','#cc88ff','#aa66ff','#ff88bb','#ffffff','#aaffcc','#ff6644'];
const STAR_GLOWS  = ['#ffcc44','#ffaa00','#88ccff','#44aaff','#cc88ff','#aa66ff','#ff88bb','#aaaaff','#aaffcc','#ff6644'];

function makeStar(size, idx) {
  const ci = idx % STAR_COLORS.length;
  // assign shape type based on idx for variety
  // 0=tall diamond, 1=wide cross, 2=tiny plus, 3=big sunburst, 4=dot, 5=elongated
  const si = idx % STAR_SVGS.length;
  return STAR_SVGS[si](STAR_COLORS[ci], size);
}

// ===================== STATE =====================
function getState(){try{const s=JSON.parse(localStorage.getItem('starjar_v5'))||{opened:[]};s.opened=[...new Set(s.opened)];return s;}catch{return{opened:[]};}}
function saveState(s){s.opened=[...new Set(s.opened)];localStorage.setItem('starjar_v5',JSON.stringify(s));}
let state = getState(), isOpen = false;

// If all stars were already opened from a previous session, reset immediately
if (new Set(state.opened).size >= 30) {
  state.opened = [];
  saveState(state);
}

// ===================== PIXEL STARFIELD =====================
const sf = document.getElementById('starfield');
const bgCols = ['#ffffff','#aaaaee','#88aaff','#ffcc44','#cc88ff','#88ffcc','#ff88aa'];
for (let i = 0; i < 90; i++) {
  const el = document.createElement('div');
  el.className = 'px-star';
  const sz = Math.random() < 0.6 ? 2 : (Math.random() < 0.7 ? 4 : 3);
  const col = bgCols[Math.floor(Math.random()*bgCols.length)];
  el.style.cssText = `width:${sz}px;height:${sz}px;background:${col};top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${1.5+Math.random()*3}s;--dl:-${Math.random()*3}s`;
  sf.appendChild(el);
}

// ===================== FILL JAR =====================
const interior = document.getElementById('jarInterior');
const cols = 4, rows = 5;
const iW = 176, iH = 187;
for (let i = 0; i < 20; i++) {
  const col = i % cols, row = Math.floor(i / cols);
  const sz = 16 + Math.floor(Math.random()*12);
  const cellW = iW / cols, cellH = iH / rows;
  const x = Math.max(0, col * cellW + (cellW - sz) * 0.5 + (Math.random() - 0.5) * 6);
  const y = Math.max(0, row * cellH + (cellH - sz) * 0.5 + (Math.random() - 0.5) * 6);
  const el = document.createElement('div');
  el.className = 'jar-inner-star';
  el.style.cssText = `left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;--bd:${1.5+Math.random()*2}s;--bdl:-${Math.random()*2}s`;
  const ci = i % STAR_COLORS.length;
  const shape = i % 2;
  el.innerHTML = STAR_SVGS[shape](STAR_COLORS[ci], sz);
  interior.appendChild(el);
}

// ===================== COUNTER =====================
function updateCounter() {
  const rem = NOTES.length - new Set(state.opened).size;
  if (rem <= 0) {
    document.getElementById('counterText').textContent = `✦ click to reset ✦`;
    document.getElementById('counterWin').style.cursor = 'pointer';
    document.getElementById('counterWin').onclick = () => {
      state.opened = [];
      saveState(state);
      updateCounter();
    };
  } else {
    document.getElementById('counterText').textContent = `${rem} star${rem!==1?'s':''} left`;
    document.getElementById('counterWin').style.cursor = '';
    document.getElementById('counterWin').onclick = null;
  }
}
updateCounter();

// ===================== DRAGGABLE WINDOWS =====================
function makeDraggable(win) {
  const bar = win.querySelector('.titlebar');
  if (!bar) return;
  let dx=0, dy=0, mx=0, my=0, dragging=false;

  bar.addEventListener('mousedown', e => {
    e.preventDefault();
    document.querySelectorAll('.win').forEach(w=>w.classList.remove('focused'));
    win.classList.add('focused');
    // pin current visual position as left/top before first drag
    if (!win.dataset.pinned) {
      const r = win.getBoundingClientRect();
      win.style.left = r.left + 'px';
      win.style.top  = r.top  + 'px';
      win.style.right  = 'auto';
      win.style.bottom = 'auto';
      win.style.transform = 'none';
      win.dataset.pinned = '1';
    }
    mx = e.clientX; my = e.clientY;
    dragging = true;
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  bar.addEventListener('touchstart', e => {
    const t = e.touches[0];
    if (!win.dataset.pinned) {
      const r = win.getBoundingClientRect();
      win.style.left = r.left + 'px';
      win.style.top  = r.top  + 'px';
      win.style.right  = 'auto';
      win.style.bottom = 'auto';
      win.style.transform = 'none';
      win.dataset.pinned = '1';
    }
    mx = t.clientX; my = t.clientY;
    document.addEventListener('touchmove', onTouchMove, {passive:false});
    document.addEventListener('touchend', onTouchUp);
  }, {passive:true});

  function onMove(e) {
    dx = e.clientX - mx; dy = e.clientY - my;
    mx = e.clientX; my = e.clientY;
    win.style.left = (win.offsetLeft + dx) + 'px';
    win.style.top  = (win.offsetTop  + dy) + 'px';
  }
  function onUp() {
    dragging = false;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
  function onTouchMove(e) {
    e.preventDefault();
    const t = e.touches[0];
    dx = t.clientX - mx; dy = t.clientY - my;
    mx = t.clientX; my = t.clientY;
    win.style.left = (win.offsetLeft + dx) + 'px';
    win.style.top  = (win.offsetTop  + dy) + 'px';
  }
  function onTouchUp() {
    document.removeEventListener('touchmove', onTouchMove);
    document.removeEventListener('touchend', onTouchUp);
  }
}

// init all windows as draggable
document.querySelectorAll('.win').forEach(makeDraggable);

// ===================== JAR CLICK =====================
document.getElementById('jarArea').addEventListener('click', () => {
  if (isOpen) return;
  isOpen = true;

  // 1. Pop the lid off
  const lid = document.getElementById('jarLid');
  lid.classList.add('popped');

  // 2. After lid pops, fly stars out from jar to their spread positions
  setTimeout(() => {
    const margin = window.innerWidth < 600 ? 36 : 60;
    const positions = scatter(NOTES.length, window.innerWidth, window.innerHeight, margin);
    const jarRect = document.getElementById('jarOuter').getBoundingClientRect();
    const jarCX = jarRect.left + jarRect.width / 2;
    const jarCY = jarRect.top + jarRect.height / 2;

    // create flying stars
    const flyers = [];
    NOTES.forEach((note, i) => {
      const sz = 32 + Math.floor(Math.random() * 24);
      const el = document.createElement('div');
      el.className = 'flying-star';
      el.style.cssText = `left:${jarCX - sz/2}px;top:${jarCY - sz/2}px;width:${sz}px;height:${sz}px;transition-delay:${i*40}ms`;
      el.innerHTML = STAR_SVGS[i % 4](STAR_COLORS[i % STAR_COLORS.length], sz);
      document.body.appendChild(el);
      flyers.push({ el, tx: positions[i].x, ty: positions[i].y, sz, i });
    });

    // start fading the jar out as stars begin flying
    const jarWin = document.getElementById('jarWin');
    jarWin.style.transition = 'opacity 0.6s steps(6)';
    jarWin.style.opacity = '0';

    // force reflow then animate stars to final positions
    flyers.forEach(f => f.el.getBoundingClientRect());

    setTimeout(() => {
      flyers.forEach(f => {
        f.el.style.left = f.tx + 'px';
        f.el.style.top  = f.ty + 'px';
      });

      // 3. After stars land — jar is gone, show spread, remove flyers
      setTimeout(() => {
        jarWin.style.display = 'none';
        document.querySelectorAll('.win').forEach(w => w.classList.add('hide'));
        buildSpread(positions);

        flyers.forEach(f => {
          f.el.classList.add('landed');
          setTimeout(() => f.el.remove(), 500);
        });

        document.getElementById('pickLabel').classList.add('visible');
        document.getElementById('backBtn').classList.add('visible');
      }, 750);

    }, 50);

  }, 400);
});

// ===================== BUILD SPREAD =====================
function buildSpread(positions) {
  const container = document.getElementById('starsContainer');
  container.innerHTML = '';
  const W = window.innerWidth, H = window.innerHeight;
  if (!positions) positions = scatter(NOTES.length, W, H, 60);

  NOTES.forEach((note, i) => {
    const sz = 28 + Math.floor(Math.random()*28);
    const el = document.createElement('div');
    const ci = i % STAR_COLORS.length;
    const doBlink = Math.random() < 0.4;
    el.className = 'spread-star' + (doBlink ? ' blinks' : '');
    const blinkD = (1.5 + Math.random()*3).toFixed(1);
    const blinkDl = -(Math.random()*3).toFixed(1);
    el.style.cssText = `left:${positions[i].x}px;top:${positions[i].y}px;width:${sz}px;height:${sz}px;--pd:0ms;--glow:${STAR_GLOWS[ci]};--blink-d:${blinkD}s;--blink-dl:${blinkDl}s`;
    // only use shapes 0-3 (tall diamond, wide cross, compact plus, big sunburst) — no boxy squares
    const si = i % 4;
    el.innerHTML = STAR_SVGS[si](STAR_COLORS[ci], sz);
    if (state.opened.includes(i)) {
      el.classList.add('spent');
    } else {
      el.addEventListener('click', () => openNote(i));
    }
    container.appendChild(el);
  });

  document.getElementById('starsSpread').classList.add('visible');
}

function scatter(n, w, h, m) {
  // Looser random — only reject very close overlaps, allow organic clustering
  const pts = [];
  const minDist = Math.min(w, h) / (Math.sqrt(n) * 1.4); // much looser min dist
  let attempts = 0;
  while (pts.length < n && attempts < n * 40) {
    attempts++;
    // bias slightly away from dead center so jar area stays clear
    const x = m + Math.random() * (w - m * 2);
    const y = m + Math.random() * (h - m * 2);
    // only skip if extremely close to another star
    let tooClose = false;
    for (const p of pts) {
      if (Math.hypot(x - p.x, y - p.y) < minDist) { tooClose = true; break; }
    }
    if (!tooClose) pts.push({x, y});
  }
  // fill any remaining with truly random
  while (pts.length < n) {
    pts.push({x: m + Math.random()*(w-m*2), y: m + Math.random()*(h-m*2)});
  }
  return pts;
}

// ===================== OPEN NOTE =====================
let resetPending = false;

function openNote(index) {
  if (!state.opened.includes(index)) {
    state.opened.push(index);
    saveState(state);
  }
  updateCounter();

  document.getElementById('noteNum').textContent = `star_${String(index+1).padStart(2,'0')}.txt`;
  document.getElementById('noteBadge').innerHTML = STAR_SVGS[index % 4](STAR_COLORS[index % STAR_COLORS.length], 40);
  document.getElementById('noteText').textContent = NOTES[index].text;

  document.getElementById('noteOverlay').classList.add('visible');
  setTimeout(() => document.getElementById('noteWin').classList.add('open'), 50);

  const uniqueOpened = new Set(state.opened).size;
  if (uniqueOpened >= NOTES.length) {
    updateCounter(); // just update counter to show reset option
  }
}

document.getElementById('noteOverlay').addEventListener('click', () => {
  if (resetPending) return; // don't interfere with reset
  document.getElementById('noteWin').classList.remove('open');
  setTimeout(() => {
    document.getElementById('noteOverlay').classList.remove('visible');
    buildSpread();
  }, 300);
});

// ===================== PUT BACK =====================
document.getElementById('backBtnInner').addEventListener('click', () => {
  document.getElementById('pickLabel').classList.remove('visible');
  document.getElementById('backBtn').classList.remove('visible');

  // 1. Get jar target position BEFORE showing it
  const jarWin = document.getElementById('jarWin');
  jarWin.style.display = '';
  jarWin.style.opacity = '0';
  jarWin.style.transition = 'none';

  // Force layout so we can measure
  jarWin.getBoundingClientRect();

  const jarRect = document.getElementById('jarOuter').getBoundingClientRect();
  const jarCX = jarRect.left + jarRect.width / 2;
  const jarCY = jarRect.top + jarRect.height / 2;

  // 2. Grab all visible spread stars and animate them flying INTO the jar
  const spreadStars = Array.from(document.querySelectorAll('.spread-star'));
  const flyers = [];

  spreadStars.forEach((star, i) => {
    const r = star.getBoundingClientRect();
    const sx = r.left, sy = r.top;
    const sz = r.width;

    const flyer = document.createElement('div');
    flyer.style.cssText = `position:fixed;left:${sx}px;top:${sy}px;width:${sz}px;height:${sz}px;z-index:65;pointer-events:none;image-rendering:pixelated;transition:left 0.5s steps(10),top 0.5s steps(10),opacity 0.4s steps(4),transform 0.5s steps(8);transition-delay:${i * 20}ms`;
    flyer.innerHTML = star.innerHTML;
    document.body.appendChild(flyer);
    flyers.push(flyer);
  });

  // Hide spread immediately
  document.getElementById('starsSpread').classList.remove('visible');

  // 3. Animate flyers toward jar centre
  requestAnimationFrame(() => requestAnimationFrame(() => {
    flyers.forEach(f => {
      f.style.left = (jarCX - 10) + 'px';
      f.style.top  = (jarCY - 10) + 'px';
      f.style.transform = 'scale(0.2)';
      f.style.opacity = '0';
    });
  }));

  // 4. After stars land — show jar with lid back on, clean up
  const totalDuration = 500 + spreadStars.length * 20 + 200;
  setTimeout(() => {
    flyers.forEach(f => f.remove());

    isOpen = false;
    document.querySelectorAll('.win').forEach(w => w.classList.remove('hide'));

    // fade jar back in
    jarWin.style.transition = 'opacity 0.4s steps(5)';
    requestAnimationFrame(() => requestAnimationFrame(() => { jarWin.style.opacity = '1'; }));

    // reset lid
    document.getElementById('jarLid').classList.remove('popped');
    updateCounter();

    // alert
    const a = document.getElementById('alertWin');
    a.classList.add('show');
    setTimeout(() => a.classList.remove('show'), 2500);
  }, totalDuration);
});

document.getElementById('alertOk').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('alertWin').classList.remove('show');
});

// focus window on click
document.querySelectorAll('.win').forEach(win => {
  win.addEventListener('mousedown', () => {
    document.querySelectorAll('.win').forEach(w=>w.classList.remove('focused'));
    win.classList.add('focused');
  });
});
